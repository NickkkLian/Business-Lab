<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>选题与项目实验室 · Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#ffffff; --paper-2:#f4f5f7; --card:#ffffff; --ink:#1b1c20; --ink-soft:#6a6e76;
  --line:#ebecef; --line-2:#dcdee3; --rust:#bb4d2b; --rust-soft:#f0d8cc;
  --teal:#157a72; --amber:#b07414; --green:#3f7d2e; --slate:#566173;
  --shadow:0 1px 2px rgba(20,22,28,.04), 0 8px 24px -16px rgba(20,22,28,.18);
  --r:14px;
  --fun:#c08a1e; --promising:#157a72; --priority:#bb4d2b;
  --serif:"Noto Serif","Noto Serif SC",Georgia,"Songti SC","Source Han Serif SC","Source Han Serif CN",serif;
}
*{box-sizing:border-box}
html{height:auto}
html,body{margin:0;padding:0}
body{overflow-x:clip}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--serif);
  font-size:14.5px; line-height:1.7;
}
h1,h2,h3{font-family:var(--serif); font-weight:700; letter-spacing:0; margin:0}
.mono{font-family:"Space Mono",ui-monospace,monospace}
button{font-family:inherit; cursor:pointer}
input,textarea,select{font-family:inherit; font-size:14px; color:var(--ink)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px;border:2px solid var(--paper)}

/* layout */
.topbar{position:sticky;top:0;z-index:30;background:var(--paper);border-bottom:1px solid var(--line)}
.tb-in{max-width:1240px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:10px;margin-right:auto}
.brand .logo{font-family:var(--serif);font-size:22px;font-weight:700}
.brand .logo b{color:var(--rust);font-style:normal}
.brand .sub{font-size:11px;color:var(--ink-soft);letter-spacing:.14em;text-transform:uppercase}
.tabs{display:flex;gap:4px;background:var(--paper-2);padding:4px;border-radius:999px;border:1px solid var(--line)}
.tab{border:none;background:transparent;padding:7px 16px;border-radius:999px;font-weight:600;color:var(--ink-soft);font-size:13px;display:flex;align-items:center;gap:7px}
.tab.active{background:var(--ink);color:var(--paper);box-shadow:var(--shadow)}
.tab .cnt{font-family:"Space Mono",monospace;font-size:11px;opacity:.7}

.sync{display:flex;align-items:center;gap:8px}
.syncchip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line-2);background:var(--card);border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.syncchip:hover{border-color:var(--ink)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line-2);flex:none}
.dot.on{background:var(--green);box-shadow:0 0 0 3px rgba(63,125,46,.16)}
.dot.dirty{background:var(--amber);box-shadow:0 0 0 3px rgba(176,116,20,.16)}
.dot.syncing{background:var(--teal);box-shadow:0 0 0 3px rgba(21,122,114,.16);animation:pulse 1s infinite}
.dot.err{background:var(--rust);box-shadow:0 0 0 3px rgba(187,77,43,.18)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.btn{border:1px solid var(--line-2);background:var(--card);color:var(--ink);padding:8px 14px;border-radius:10px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:.15s}
.btn:hover{border-color:var(--ink);transform:translateY(-1px)}
.btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn.rust{background:var(--rust);color:#fff;border-color:var(--rust)}
.btn.ghost{background:transparent;border-color:transparent}
.btn.ghost:hover{background:var(--paper-2);transform:none}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.wrap{max-width:1240px;margin:0 auto;padding:26px 22px 120px}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:22px}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--line-2);background:var(--card);border-radius:11px;outline:none}
.search input:focus{border-color:var(--ink)}
.search svg{position:absolute;left:11px;top:11px;opacity:.45}
select.ctl{padding:9px 12px;border:1px solid var(--line-2);background:var(--card);border-radius:11px;outline:none;font-weight:500}

/* board */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:start}
.col{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r);padding:14px;min-height:120px}
.col-h{display:flex;align-items:center;gap:9px;margin-bottom:12px;padding:0 4px}
.col-h .tag{width:11px;height:11px;border-radius:3px}
.col-h h3{font-size:16px}
.col-h .n{margin-left:auto;font-family:"Space Mono",monospace;font-size:12px;color:var(--ink-soft)}
.col.drag-over{background:var(--rust-soft);border-color:var(--rust)}

.card{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 14px;margin-bottom:11px;cursor:pointer;transition:.15s;box-shadow:var(--shadow);position:relative}
.card:hover{border-color:var(--ink);transform:translateY(-2px)}
.card.dragging{opacity:.4}
.card .ttl{font-weight:600;font-size:15px;display:flex;align-items:center;gap:7px;line-height:1.3;padding-right:22px}
.cardx{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:6px;border:1px solid var(--line-2);background:var(--card);color:var(--ink-soft);display:flex;align-items:center;justify-content:center;font-size:12px;opacity:0;transition:.15s;line-height:1;padding:0}
.card:hover .cardx{opacity:1}
.cardx:hover{background:var(--rust);color:#fff;border-color:var(--rust)}
.card .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;align-items:center}
.pill{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--line-2);color:var(--ink-soft);background:var(--paper)}
.pill.path{font-family:"Space Mono",monospace;letter-spacing:-.02em}
.scorebadge{margin-left:auto;font-family:"Space Mono",monospace;font-weight:700;font-size:15px}
.bar{height:5px;border-radius:4px;background:var(--paper-2);overflow:hidden;margin-top:10px}
.bar > i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--amber),var(--rust))}
.card .note-snip{font-size:12px;color:var(--ink-soft);margin-top:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.statusdot{width:7px;height:7px;border-radius:50%;flex:none}

.add-row{margin-top:6px}
.add-row .btn{width:100%;justify-content:center;border-style:dashed;color:var(--ink-soft)}

/* research */
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.kind{font-size:11px;padding:2px 9px;border-radius:999px;color:#fff;border:none;font-weight:600;letter-spacing:.02em}
.rcard .desc{font-size:12.5px;color:var(--ink-soft);margin-top:9px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.rcard .refcnt{font-family:"Space Mono",monospace;font-size:11px;color:var(--ink-soft)}
.refrow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px dashed var(--line)}
.refrow .rt{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.refrow .a{font-size:12px;color:var(--teal);cursor:pointer;font-weight:600}
.refrow .x{color:var(--ink-soft);cursor:pointer}
.backref{font-size:13px;padding:6px 0;border-bottom:1px dashed var(--line);cursor:pointer}
.backref:hover{color:var(--rust)}

/* dashboard */
.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.stat .k{font-size:12px;color:var(--ink-soft);letter-spacing:.04em}
.stat .v{font-family:var(--serif);font-size:34px;font-weight:700;line-height:1.1;margin-top:4px}
.stat .v small{font-size:14px;color:var(--ink-soft);font-family:var(--serif);font-weight:400}
.dash-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.panel h3{font-size:16px;margin-bottom:14px}
.rank{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line)}
.rank:last-child{border:none}
.rank .i{font-family:"Space Mono",monospace;color:var(--ink-soft);font-size:12px;width:18px}
.rank .nm{font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank .sc{font-family:"Space Mono",monospace;font-weight:700}
.empty{color:var(--ink-soft);font-size:13px;padding:18px;text-align:center}

/* detail page (full screen) */
.detail{position:fixed;inset:0;background:var(--paper);z-index:50;display:none;flex-direction:column}
.detail.on{display:flex}
#detail-content{flex:1;min-height:0;display:flex;flex-direction:column}
.detail-h{position:sticky;top:0;background:var(--paper);border-bottom:1px solid var(--line);padding:13px 22px;display:flex;align-items:center;gap:12px;z-index:5;flex-wrap:wrap}
.detail-h .nm{font-family:var(--serif);font-weight:700;font-size:18px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:40vw}
.back{border:1px solid var(--line-2);background:var(--card);border-radius:10px;padding:7px 13px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.back:hover{border-color:var(--ink)}
.detail-body{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:30px 22px 90px}
.detail-grid{max-width:980px;margin:0 auto;display:grid;grid-template-columns:1.45fr 1fr;gap:34px;align-items:start}
.detail-col{min-width:0}
.side-panel{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r);padding:18px}
@media(max-width:780px){.detail-grid{grid-template-columns:1fr;gap:8px}.detail-h .nm{max-width:50vw}}
.dr-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.dr-h .x{margin-left:auto}
.dr-b{flex:1;overflow:auto;padding:20px 22px}
.dr-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center;background:var(--card)}
.field{margin-bottom:18px}
.field > label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);letter-spacing:.12em;margin-bottom:7px}
.field input[type=text],.field textarea,.field select{width:100%;padding:10px 12px;border:1px solid var(--line-2);background:var(--card);border-radius:10px;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--ink)}
.field textarea{resize:vertical;min-height:80px;line-height:1.6}
.field .hint{font-size:11px;color:var(--ink-soft);margin-top:5px;font-weight:400;text-transform:none;letter-spacing:0}
.title-in{font-family:var(--serif) !important;font-size:24px !important;font-weight:700;padding:6px 0 !important;border:none !important;background:transparent !important;width:100%}
.sel-row{display:flex;gap:8px;flex-wrap:wrap}
.sel-row select{flex:1;min-width:120px}

.metric{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px dashed var(--line)}
.metric .mn{flex:1;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.metric .mn .cost{font-size:10px;color:var(--rust);border:1px solid var(--rust-soft);padding:0 5px;border-radius:5px}
.metric input[type=range]{flex:1.4;accent-color:var(--rust)}
.metric .mv{font-family:"Space Mono",monospace;font-weight:700;width:26px;text-align:right}
.totalbox{display:flex;align-items:center;gap:14px;background:var(--ink);color:var(--paper);border-radius:12px;padding:14px 18px;margin:6px 0 18px}
.totalbox .lab{font-size:12px;letter-spacing:.1em;text-transform:uppercase;opacity:.8}
.totalbox .num{font-family:var(--serif);font-size:32px;font-weight:700;margin-left:auto}
.totalbox .num small{font-size:14px;opacity:.7}

.tags-edit{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tagchip{font-size:12px;background:var(--paper-2);border:1px solid var(--line-2);padding:3px 8px;border-radius:999px;display:flex;align-items:center;gap:5px}
.tagchip b{cursor:pointer;color:var(--ink-soft)}
.tag-in{border:1px dashed var(--line-2)!important;background:transparent!important;width:110px!important;padding:4px 8px!important;border-radius:999px!important;font-size:12px!important}
.linkrow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px dashed var(--line)}
.linkrow .x{margin-left:auto;color:var(--ink-soft);cursor:pointer}

/* modal (settings) */
.modal{position:fixed;inset:0;z-index:60;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;background:rgba(35,36,31,.4)}
.modal.on{display:flex}
.sheet{background:var(--paper);width:640px;max-width:100%;border-radius:18px;border:1px solid var(--line-2);box-shadow:0 30px 80px -30px rgba(0,0,0,.5)}
.sheet-h{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center}
.sheet-h h2{font-size:20px}
.sheet-b{padding:22px 24px}
.acc{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;background:var(--card)}
.acc > summary{padding:13px 16px;font-weight:600;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px}
.acc > summary::-webkit-details-marker{display:none}
.acc > summary .chev{margin-left:auto;transition:.2s}
.acc[open] > summary .chev{transform:rotate(90deg)}
.acc .body{padding:4px 16px 16px}
.cfg-metric{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.cfg-metric input[type=text]{flex:1;padding:7px 10px;border:1px solid var(--line-2);border-radius:8px;background:var(--paper)}
.cfg-metric input[type=number]{width:62px;padding:7px;border:1px solid var(--line-2);border-radius:8px;background:var(--paper)}
.cfg-metric .ck{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--ink-soft)}
.catlist{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.catchip{font-size:12px;background:var(--paper-2);border:1px solid var(--line-2);padding:4px 9px;border-radius:8px;display:flex;align-items:center;gap:6px}
.catchip b{cursor:pointer;color:var(--rust)}
label.inl{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin:14px 0 5px;letter-spacing:.04em}
.sheet input.full{width:100%;padding:9px 12px;border:1px solid var(--line-2);border-radius:10px;background:var(--card);outline:none}
.sheet input.full:focus{border-color:var(--ink)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13px;font-weight:500;z-index:80;opacity:0;transition:.25s;box-shadow:var(--shadow);pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--rust)}

.del-x{color:var(--rust);background:transparent;border:1px solid var(--rust-soft)}
.del-x:hover{background:var(--rust);color:#fff;border-color:var(--rust)}

@media (max-width:880px){
  .board{grid-template-columns:1fr}
  .dash{grid-template-columns:1fr 1fr}
  .dash-2{grid-template-columns:1fr}
  .tb-in{padding:12px 16px}
  .brand{width:100%;margin-bottom:6px}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-in">
    <div class="brand">
      <span class="logo"><b>Lab</b>·选题与项目实验室</span>
      <span class="sub">private notebook</span>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab" data-tab="dashboard">概览</button>
      <button class="tab" data-tab="projects">商业化项目 <span class="cnt" id="cnt-p"></span></button>
      <button class="tab" data-tab="media">自媒体方向 <span class="cnt" id="cnt-m"></span></button>
      <button class="tab" data-tab="freelance">Freelance <span class="cnt" id="cnt-f"></span></button>
      <button class="tab" data-tab="career">备选职业 <span class="cnt" id="cnt-c"></span></button>
      <button class="tab" data-tab="research">研究资料 <span class="cnt" id="cnt-r"></span></button>
    </div>
    <div class="sync">
      <button class="syncchip" id="syncchip" title="点击立即同步 / 重试"><span class="dot" id="syncdot"></span><span id="synctext">未连接</span></button>
      <button class="btn sm ghost" id="btn-settings" title="设置">⚙</button>
    </div>
  </div>
</div>

<div class="wrap" id="view"></div>

<!-- detail (full page) -->
<div class="detail" id="detail"><div id="detail-content"></div></div>

<!-- settings modal -->
<div class="modal" id="modal">
  <div class="sheet">
    <div class="sheet-h"><h2>设置</h2><button class="btn ghost sm" id="modal-close" style="margin-left:auto">关闭 ✕</button></div>
    <div class="sheet-b" id="sheet-b"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================ 状态 ============================ */
const TOP_CATS_DEFAULT = ['感觉好玩','有点说法','优先考虑'];
const CAT_COLOR = {'感觉好玩':'var(--fun)','有点说法':'var(--promising)','优先考虑':'var(--priority)'};
const STATUS = [
  {k:'想法', c:'#9a958a'},{k:'调研中', c:'var(--amber)'},{k:'验证中', c:'var(--teal)'},
  {k:'进行中', c:'var(--green)'},{k:'已暂停', c:'#8a7a9a'},{k:'已放弃', c:'#b6b1a4'}
];
const statusColor = k => (STATUS.find(s=>s.k===k)||{}).c || 'var(--line-2)';
const KIND_PALETTE = ['var(--teal)','var(--rust)','var(--slate)','var(--amber)','var(--green)','#7c5cbf'];
function kindColor(k){const i=state.config.researchKinds.indexOf(k);return KIND_PALETTE[(i<0?0:i)%KIND_PALETTE.length];}
function refCount(rid){return [...state.projects,...state.media].filter(o=>(o.refs||[]).includes(rid)).length;}

const DEFAULT_CONFIG = {
  topCats: [...TOP_CATS_DEFAULT],
  midCats: ['视频','图文'],
  researchKinds: ['行业研究','盈利模式','博主拆解','通用'],
  mediaBottom: ['知识科普','测评开箱','Vlog生活','剧情短片','教程干货','资讯解读','观点输出','穿搭美妆','美食探店','干货图文','信息差搬运','情绪共鸣'],
  projectMetrics: [
    {id:'m1', name:'市场规模', weight:2, type:'value'},
    {id:'m2', name:'竞争程度', weight:1, type:'cost'},
    {id:'m3', name:'启动成本', weight:1, type:'cost'},
    {id:'m4', name:'上手难度', weight:1, type:'cost'},
    {id:'m5', name:'个人匹配度', weight:2, type:'value'},
    {id:'m6', name:'盈利速度', weight:1.5, type:'value'},
    {id:'m7', name:'可规模化', weight:1.5, type:'value'},
    {id:'m8', name:'护城河', weight:1, type:'value'},
  ],
  mediaMetrics: [
    {id:'n1', name:'可快速复制', weight:1.5, type:'value'},
    {id:'n2', name:'需持续学习', weight:1, type:'cost'},
    {id:'n3', name:'盈利能力', weight:2, type:'value'},
    {id:'n4', name:'受众规模', weight:1.5, type:'value'},
    {id:'n5', name:'内容可持续', weight:1.5, type:'value'},
    {id:'n6', name:'兴趣匹配', weight:1.5, type:'value'},
    {id:'n7', name:'起号速度', weight:1, type:'value'},
  ],
  freelanceMetrics: [
    {id:'f1', name:'单价/时薪', weight:2, type:'value'},
    {id:'f2', name:'上手难度', weight:1, type:'cost'},
    {id:'f3', name:'需求稳定', weight:1.5, type:'value'},
    {id:'f4', name:'竞争程度', weight:1, type:'cost'},
    {id:'f5', name:'兴趣匹配', weight:1.5, type:'value'},
    {id:'f6', name:'可远程', weight:1, type:'value'},
    {id:'f7', name:'成长性', weight:1, type:'value'},
  ],
  careerMetrics: [
    {id:'c1', name:'薪资水平', weight:2, type:'value'},
    {id:'c2', name:'入行门槛', weight:1.5, type:'cost'},
    {id:'c3', name:'行业前景', weight:2, type:'value'},
    {id:'c4', name:'工作强度', weight:1, type:'cost'},
    {id:'c5', name:'兴趣匹配', weight:1.5, type:'value'},
    {id:'c6', name:'稳定性', weight:1, type:'value'},
    {id:'c7', name:'转行成本', weight:1, type:'cost'},
  ],
};

const arrFor = type => state[KINDS[type].arr];

let state = {

  media: [],

  career: [],
  research: [],

  syncMsg: '',

/* ============================ 持久化(本地) ============================ */
const LS = 'lab_db_v1';
function saveLocal(){
  localStorage.setItem(LS, JSON.stringify({
    config:state.config, projects:state.projects, media:state.media,
    freelance:state.freelance, career:state.career, research:state.research,
    gh:state.gh, ui:state.ui, sha:state.sha, dirty:state.dirty
  }));
}
function loadLocal(){
  try{
    const r = JSON.parse(localStorage.getItem(LS)||'null');
    if(r){
      state.config = Object.assign(structuredClone(DEFAULT_CONFIG), r.config||{});
      state.projects = r.projects||[]; state.media = r.media||[]; state.research = r.research||[];
      state.freelance = r.freelance||[]; state.career = r.career||[];
      state.gh = Object.assign(state.gh, r.gh||{});
      state.ui = Object.assign(state.ui, r.ui||{});
      state.sha = r.sha||null; state.dirty = !!r.dirty;
    }
  }catch(e){}
}

/* ============================ GitHub API ============================ */
const b64encode = s => btoa(unescape(encodeURIComponent(s)));
const b64decode = b => decodeURIComponent(escape(atob(b.replace(/\n/g,''))));
function ghHeaders(){return {'Authorization':'token '+state.gh.token,'Accept':'application/vnd.github+json'};}
function ghUrl(){return `https://api.github.com/repos/${state.gh.owner}/${state.gh.repo}/contents/${state.gh.path}`;}

async function ghLoad(){
  const {owner,repo,token} = state.gh;
  if(!owner||!repo||!token){toast('请先在设置里填写仓库与 Token','err');return false;}
  setSync('syncing','载入中…');
  try{
    const res = await fetch(ghUrl()+'?ref='+encodeURIComponent(state.gh.branch||'main')+'&t='+Date.now(), {headers:ghHeaders(),cache:'no-store'});
    if(res.status===404){ // 文件不存在 → 视为空数据库，首次同步会创建
      state.sha=null; state.connected=true; setSync('pending','私有库暂无数据文件，将自动创建');
      saveLocal(); render(); scheduleSync(300); return true;
    }
    if(res.status===401){setSync('error','Token 无效或已过期');openSettings();return false;}
    if(!res.ok){setSync('error','连接失败 '+res.status);return false;}
    const j = await res.json();
    const data = JSON.parse(b64decode(j.content));
    state.sha = j.sha;
    state.config = Object.assign(structuredClone(DEFAULT_CONFIG), data.config||{});
    state.projects = data.projects||[]; state.media = data.media||[]; state.research = data.research||[];
    state.freelance = data.freelance||[]; state.career = data.career||[];
    state.connected = true; state.dirty=false;
    saveLocal(); render(); setSync('synced','已载入'); return true;
  }catch(e){setSync('error','载入出错: '+e.message);return false;}
}

// 取最新 sha（用于冲突自愈）
async function ghFetchSha(){
  try{
    const res = await fetch(ghUrl()+'?ref='+encodeURIComponent(state.gh.branch||'main')+'&t='+Date.now(),{headers:ghHeaders(),cache:'no-store'});
    if(res.status===404) return null;
    if(!res.ok) return undefined;
    const j=await res.json(); return j.sha||null;
  }catch(e){return undefined;}
}

// 单次 PUT；遇 sha 冲突自动取最新 sha 重试一次
async function ghPutOnce(){
  const payload = {version:2, config:state.config, projects:state.projects, media:state.media,
    freelance:state.freelance, career:state.career, research:state.research, savedAt:new Date().toISOString()};
  const mkBody = sha => {const b={message:`update @ ${new Date().toLocaleString('zh-CN')}`,content:b64encode(JSON.stringify(payload,null,2)),branch:state.gh.branch||'main'};if(sha)b.sha=sha;return JSON.stringify(b);};
  let res = await fetch(ghUrl(),{method:'PUT',headers:ghHeaders(),body:mkBody(state.sha)});
  if(res.status===409 || res.status===422){ // sha 过期/缺失 → 取最新再试
    const fresh = await ghFetchSha();
    if(fresh!==undefined){ state.sha = fresh; res = await fetch(ghUrl(),{method:'PUT',headers:ghHeaders(),body:mkBody(fresh)}); }
  }
  return res;
}

/* ====== 自动同步调度 ====== */
let syncTimer=null, syncing=false, editSeq=0, syncedSeq=0, retryCount=0;
function setSync(status,msg){state.syncStatus=status; if(msg!=null)state.syncMsg=msg; updateSyncDot();}
function scheduleSync(delay){
  if(!(state.gh.owner&&state.gh.repo&&state.gh.token)){setSync('local','仅本地（未连接仓库）');return;}
  clearTimeout(syncTimer);
  if(state.syncStatus!=='error') setSync('pending','待同步');
  syncTimer=setTimeout(doSync, delay==null?1800:delay);
}
async function doSync(){
  if(!(state.gh.owner&&state.gh.repo&&state.gh.token)){setSync('local','仅本地（未连接仓库）');return;}
  if(syncing) return;            // 正在同步，结束后会按 editSeq 自动再同步
  syncing=true; const seq=editSeq;
  setSync('syncing','同步中…');
  try{
    const res = await ghPutOnce();
    if(res.status===401){syncing=false;setSync('error','Token 无效/过期，点此重新设置');return;}
    if(res.status===403){syncing=false;setSync('error','无写入权限或触发限流');return;}
    if(!res.ok){const e=await res.json().catch(()=>({})); throw new Error(e.message||('HTTP '+res.status));}
    const j=await res.json(); state.sha=j.content.sha;
    state.connected=true; retryCount=0; syncedSeq=seq;
    if(editSeq===seq){state.dirty=false; setSync('synced','已同步');}
    else {setSync('pending','待同步'); scheduleSync(800);}  // 同步期间又有新改动
    saveLocal();
  }catch(e){
    retryCount++;
    setSync('error','同步失败：'+e.message+(retryCount<5?'（将自动重试）':'，点此重试'));
    if(retryCount<5) syncTimer=setTimeout(doSync, Math.min(2000*retryCount,15000)); // 退避重试
  }finally{ syncing=false; }
}
function forceSync(){retryCount=0;clearTimeout(syncTimer);doSync();}

/* ============================ 工具 ============================ */
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function markDirty(){state.dirty=true; editSeq++; saveLocal(); scheduleSync();}
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast on'+(type==='err'?' err':'');clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',2600);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function scoreOf(item, metrics){
  let num=0, den=0;
  metrics.forEach(m=>{
    const v = (item.scores && item.scores[m.id]!=null) ? item.scores[m.id] : null;
    if(v==null) return;
    const w = +m.weight||1;
    num += (m.type==='cost' ? (10-v) : v) * w;
    den += 10*w;
  });
  if(den===0) return null;
  return Math.round(num/den*100);
}
function hasAnyScore(item){return item.scores && Object.values(item.scores).some(v=>v!=null);}

/* ============================ 渲染：顶部 ============================ */
function updateSyncDot(){
  const d=document.getElementById('syncdot'), t=document.getElementById('synctext');
  const st=state.syncStatus;
  let cls='dot', txt=state.syncMsg||'';
  if(st==='syncing'){cls+=' syncing'; txt=txt||'同步中…';}
  else if(st==='error'){cls+=' err'; txt=txt||'同步失败';}
  else if(st==='pending'){cls+=' dirty'; txt=txt||'待同步';}
  else if(st==='synced'){cls+=' on'; txt=txt||'已同步';}
  else if(st==='local'){cls+=''; txt=txt||'仅本地';}
  else {txt=txt||(state.connected?'已连接':'未连接');}
  if(d) d.className=cls;
  if(t) t.textContent=txt;
  const set=(id,n)=>{const el=document.getElementById(id);if(el)el.textContent=n||'';};
  set('cnt-p',state.projects.length); set('cnt-m',state.media.length);
  set('cnt-f',state.freelance.length); set('cnt-c',state.career.length);
  set('cnt-r',state.research.length);
}

function render(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===state.ui.tab));
  updateSyncDot();
  const v=document.getElementById('view');
  if(state.ui.tab==='dashboard') v.innerHTML=renderDashboard();
  else if(state.ui.tab==='research') renderResearch();
  else if(BOARD_TYPES.includes(state.ui.tab)) renderBoard(state.ui.tab);
  else v.innerHTML=renderDashboard();
  saveLocal();
}

/* ============================ 概览 ============================ */
function renderDashboard(){
  const stat=(k,v,sub)=>`<div class="stat"><div class="k">${k}</div><div class="v">${v}${sub?` <small>${sub}</small>`:''}</div></div>`;
  const rankRow=(o,i,type)=>`<div class="rank" onclick="openDrawer('${type}','${o.x.id}')" style="cursor:pointer">
      <span class="i">${String(i+1).padStart(2,'0')}</span>
      <span class="nm">${esc(o.x.name||'未命名')}</span>
      <span class="sc">${o.s}</span></div>`;
  const topN=type=>[...arrFor(type)].map(x=>({x,s:scoreOf(x,metricsFor(type))})).filter(o=>o.s!=null).sort((a,b)=>b.s-a.s).slice(0,5);
  const catOf=(x,type)=> type==='media'? x.top : x.category;
  const panel=type=>{const arr=topN(type);return `<div class="panel"><h3>${KINDS[type].label} · Top 5</h3>${arr.length?arr.map((o,i)=>rankRow(o,i,type)).join(''):'<div class="empty">还没有评分项</div>'}</div>`;};
  return `
  <div class="dash">
    ${BOARD_TYPES.map(t=>stat(KINDS[t].label, arrFor(t).length, '个')).join('')}
  </div>
  <div class="dash" style="grid-template-columns:repeat(3,1fr)">
    ${TOP_CATS_DEFAULT.map(c=>{
       const counts=BOARD_TYPES.map(t=>arrFor(t).filter(x=>catOf(x,t)===c).length).reduce((a,b)=>a+b,0);
       return `<div class="stat"><div class="k" style="display:flex;align-items:center;gap:7px"><span style="width:9px;height:9px;border-radius:2px;background:${CAT_COLOR[c]}"></span>${c}</div><div class="v" style="font-size:26px">${counts} <small>条（全部大类）</small></div></div>`;
     }).join('')}
  </div>
  <div class="dash-2">
    ${BOARD_TYPES.map(panel).join('')}
  </div>`;
}

/* ============================ 看板（四个大类共用） ============================ */
function catKey(type){return type==='media'?'top':'category';}
function filteredItems(type){
  const arr = arrFor(type);
  const metrics = metricsFor(type);
  let list = arr.slice();
  const q = state.ui.search.trim().toLowerCase();
  if(q) list = list.filter(x=>{
    const blob = [x.name, x.summary, x.notes, x.research, x.analysis, x.detail, (x.tags||[]).join(' '),
      x.mid, x.bottom, x.platforms, x.status].join(' ').toLowerCase();
    return blob.includes(q);
  });
  if(state.ui.filter!=='all') list = list.filter(x=>x.status===state.ui.filter);
  const s = state.ui.sort;
  list.sort((a,b)=>{
    if(s==='score') return (scoreOf(b,metrics)??-1)-(scoreOf(a,metrics)??-1);
    if(s==='name') return (a.name||'').localeCompare(b.name||'','zh');
    if(s==='updated') return (b.updatedAt||'').localeCompare(a.updatedAt||'');
    return 0;
  });
  return list;
}

function renderBoard(type){
  const metrics = metricsFor(type);
  const ck = catKey(type);
  const list = filteredItems(type);
  const statusOpts = ['<option value="all">全部状态</option>'].concat(STATUS.map(s=>`<option value="${s.k}" ${state.ui.filter===s.k?'selected':''}>${s.k}</option>`)).join('');
  const controls = `
   <div class="controls">
     <div class="search">
       <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
       <input id="search" placeholder="搜索名称 / 备注 / 标签 / 资料…" value="${esc(state.ui.search)}">
     </div>
     <select class="ctl" id="sortsel">
       <option value="score" ${state.ui.sort==='score'?'selected':''}>按评分</option>
       <option value="updated" ${state.ui.sort==='updated'?'selected':''}>按更新时间</option>
       <option value="name" ${state.ui.sort==='name'?'selected':''}>按名称</option>
     </select>
     <select class="ctl" id="filtersel">${statusOpts}</select>
     <button class="btn primary" id="add-btn">＋ 新建${KINDS[type].noun}</button>
   </div>`;

  const cols = TOP_CATS_DEFAULT.map(cat=>{
    const items = list.filter(x=> x[ck] === cat);
    const cards = items.map(x=>cardHTML(x,type,metrics)).join('');
    return `<div class="col" data-cat="${cat}" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${type}','${cat}')">
      <div class="col-h"><span class="tag" style="background:${CAT_COLOR[cat]}"></span><h3>${cat}</h3><span class="n">${items.length}</span></div>
      ${cards||'<div class="empty">空</div>'}
      <div class="add-row"><button class="btn sm" onclick="quickAdd('${type}','${cat}')">＋ 加到这里</button></div>
    </div>`;
  }).join('');

  document.getElementById('view').innerHTML = controls + `<div class="board">${cols}</div>`;

  const se=document.getElementById('search');
  se.oninput=debounce(e=>{state.ui.search=se.value;renderBoard(type);
    const n=document.getElementById('search'); if(n){n.focus();n.setSelectionRange(n.value.length,n.value.length);} },280);
  document.getElementById('sortsel').onchange=e=>{state.ui.sort=e.target.value;renderBoard(type);};
  document.getElementById('filtersel').onchange=e=>{state.ui.filter=e.target.value;renderBoard(type);};
  document.getElementById('add-btn').onclick=()=>quickAdd(type,'感觉好玩');
}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}

function cardHTML(x,type,metrics){
  const sc = scoreOf(x,metrics);
  const path = type==='media'? `<span class="pill path">${esc(x.mid||'?')} › ${esc(x.bottom||'?')}</span>`:'';
  const plat = (type==='media' && (x.platforms||'').trim())? `<span class="pill">📍 ${esc(x.platforms)}</span>`:'';
  const status = x.status? `<span class="pill" style="display:flex;align-items:center;gap:5px"><span class="statusdot" style="background:${statusColor(x.status)}"></span>${esc(x.status)}</span>`:'';
  const tags=(x.tags||[]).slice(0,3).map(t=>`<span class="pill">#${esc(t)}</span>`).join('');
  const refp=(x.refs&&x.refs.length)?`<span class="pill">📎 研究×${x.refs.length}</span>`:'';
  const snip = ((x.summary||'').trim() || (x.notes||'').trim());
  return `<div class="card" draggable="true" data-id="${x.id}"
      ondragstart="onDragStart(event,'${x.id}')" ondragend="onDragEnd(event)"
      onclick="openDrawer('${type}','${x.id}')">
    <button class="cardx" title="删除" onclick="quickDelete(event,'${type}','${x.id}')">✕</button>
    <div class="ttl">${esc(x.name||'未命名')} ${sc!=null?`<span class="scorebadge" style="margin-left:auto;color:${sc>=70?'var(--green)':sc>=45?'var(--amber)':'var(--rust)'}">${sc}</span>`:''}</div>
    <div class="meta">${path}${plat}${status}${tags}${refp}</div>
    ${sc!=null?`<div class="bar"><i style="width:${sc}%"></i></div>`:''}
    ${snip?`<div class="note-snip">${esc(snip)}</div>`:''}
  </div>`;
}

/* 拖拽换分类 */
let dragId=null;
function onDragStart(e,id){dragId=id;e.currentTarget.classList.add('dragging');}
function onDragEnd(e){e.currentTarget.classList.remove('dragging');dragId=null;}
function onDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function onDrop(e,type,cat){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  const it = arrFor(type).find(x=>x.id===dragId); if(!it) return;
  it[catKey(type)]=cat;
  it.updatedAt=new Date().toISOString();
  markDirty(); renderBoard(type);
}

/* 快速删除（卡片角标） */
function quickDelete(e,type,id){
  e.stopPropagation();
  if(!confirm('确认删除这一条？')) return;
  if(type==='research') state.research=state.research.filter(x=>x.id!==id);
  else { const k=KINDS[type].arr; state[k]=state[k].filter(x=>x.id!==id); }
  cleanupRefs(id);
  markDirty(); render();
}
function allItems(){return [...state.projects,...state.media,...state.freelance,...state.career];}
function cleanupRefs(id){allItems().forEach(o=>{
  if(o.linked)o.linked=o.linked.filter(l=>l!==id);
  if(o.refs)o.refs=o.refs.filter(l=>l!==id);
});}

/* 快速新建 */

let drawerCtx=null;
function openDrawer(type,id,isNew){
  const arr = type==='research'?state.research:arrFor(type);
  const it=arr.find(x=>x.id===id); if(!it) return;
  drawerCtx={type,id};
  document.getElementById('detail-content').innerHTML = drawerHTML(it,type);
  document.getElementById('detail').classList.add('on');
  document.body.style.overflow='hidden';
  document.getElementById('detail-body')?.scrollTo(0,0);
  bindDrawer(it,type);
  if(isNew) setTimeout(()=>{const n=document.getElementById('f-name')||document.getElementById('r-title');if(n)n.focus();},120);
}
function closeDrawer(){
  if(drawerCtx){ applyDrawerFields(); markDirty(); }
  document.getElementById('detail').classList.remove('on');
  document.body.style.overflow='';
  drawerCtx=null;
  render();
}

  const linkTargets = type==='media'? state.projects : (type==='projects'? state.media : []);

          <div class="totalbox"><span class="lab">综合评分</span><span class="num" id="total-num">${sc!=null?sc:'–'}<small>/100</small></span></div>

function bindDrawer(it,type){
  const metrics = type==='research'? [] : metricsFor(type);
  // 滑块实时
  document.querySelectorAll('.msl').forEach(sl=>{
    sl.oninput=()=>{
      const mid=sl.dataset.mid; sl.removeAttribute('data-unset');
      if(!it.scores) it.scores={}; it.scores[mid]=+sl.value;
      document.querySelector(`.mv[data-for="${mid}"]`).textContent=sl.value;
      const sc=scoreOf(it,metrics);
      document.getElementById('total-num').innerHTML = (sc!=null?sc:'–')+'<small>/100</small>';
      document.getElementById('dr-score').textContent = sc!=null?'综合评分 '+sc:'未评分';
      it.updatedAt=new Date().toISOString(); markDirty();
    };
  });
  // 标签
  const ti=document.getElementById('tag-in');
  if(ti) ti.onkeydown=e=>{
    if(e.key==='Enter'&&ti.value.trim()){
      it.tags=it.tags||[]; const v=ti.value.trim().replace(/^#/,'');
      if(!it.tags.includes(v)) it.tags.push(v);
      ti.value=''; refreshTags(it); markDirty();
    }
  };
  // 关联
  const lk=document.getElementById('f-link');
  if(lk) lk.onchange=()=>{
    if(lk.value){it.linked=it.linked||[]; if(!it.linked.includes(lk.value)) it.linked.push(lk.value); markDirty(); refreshDrawer();}
  };
  // 引用研究
  const rf=document.getElementById('f-ref');
  if(rf) rf.onchange=()=>{
    if(rf.value){it.refs=it.refs||[]; if(!it.refs.includes(rf.value)) it.refs.push(rf.value); markDirty(); refreshDrawer();}
  };
  // 边输入边自动应用 → 触发自动同步（无需手动保存）
  const body=document.getElementById('detail-body');
  if(body){
    const auto=debounce(()=>{applyDrawerFields();markDirty();},600);
    body.addEventListener('input',auto);
    body.addEventListener('change',()=>{applyDrawerFields();markDirty();});
  }
}
function refreshTags(it){
  const box=document.getElementById('tags-box');
  const ti=box.querySelector('#tag-in');
  box.querySelectorAll('.tagchip').forEach(n=>n.remove());
  (it.tags||[]).slice().reverse().forEach(t=>{
    const s=document.createElement('span');s.className='tagchip';
    s.innerHTML=`#${esc(t)} <b onclick="rmTag('${esc(t)}')">✕</b>`;
    box.insertBefore(s,box.firstChild);
  });
}
function curItem(){const arr=drawerCtx.type==='research'?state.research:arrFor(drawerCtx.type);return arr.find(x=>x.id===drawerCtx.id);}
function rmTag(t){const it=curItem();it.tags=(it.tags||[]).filter(x=>x!==t);refreshTags(it);markDirty();}
function unlink(id){const it=curItem();it.linked=(it.linked||[]).filter(x=>x!==id);markDirty();refreshDrawer();}
function rmRef(id){const it=curItem();it.refs=(it.refs||[]).filter(x=>x!==id);markDirty();refreshDrawer();}
function viewRef(rid){applyDrawerFields();markDirty();openDrawer('research',rid);}
function refreshDrawer(){const it=curItem();document.getElementById('detail-content').innerHTML=drawerHTML(it,drawerCtx.type);bindDrawer(it,drawerCtx.type);}

function applyDrawerFields(){
  if(!drawerCtx) return;
  const it=curItem(); if(!it) return; const type=drawerCtx.type;
  if(type==='research'){
    it.title=(document.getElementById('r-title').value||'').trim();
    it.kind=document.getElementById('r-kind').value;
    it.summary=document.getElementById('r-summary').value;
    it.body=document.getElementById('r-body').value;
  }else{
    it.name=(document.getElementById('f-name').value||'').trim();
    it.summary=document.getElementById('f-summary').value;
    it.status=document.getElementById('f-status').value;
    it.notes=document.getElementById('f-notes').value;
    if(type==='media'){
      it.top=document.getElementById('f-top').value;
      it.mid=document.getElementById('f-mid').value;
      it.bottom=document.getElementById('f-bottom').value;
      it.platforms=document.getElementById('f-platforms').value;
    }else{
      it.category=document.getElementById('f-cat').value;
    }
    it[KINDS[type].bigKey]=document.getElementById('f-big').value;
  }
  it.updatedAt=new Date().toISOString();
}
function saveDrawer(){
  applyDrawerFields();
  markDirty(); closeDrawer();
}
function delItem(){
  if(!confirm('确认删除这一条？')) return;
  const id=drawerCtx.id, type=drawerCtx.type;
  if(type==='research') state.research=state.research.filter(x=>x.id!==id);
  else { const k=KINDS[type].arr; state[k]=state[k].filter(x=>x.id!==id); }
  cleanupRefs(id);
  markDirty(); closeDrawer();
}

function bindSettings(){
  const g=id=>document.getElementById(id);
  ['owner','repo','path','branch','token'].forEach(k=>{
    g('g-'+k).oninput=e=>{state.gh[k]=e.target.value.trim();saveLocal();};
  });
  g('g-connect').onclick=async()=>{await ghLoad();};
  g('g-export').onclick=()=>{
    const blob=new Blob([JSON.stringify({version:2,config:state.config,projects:state.projects,media:state.media,freelance:state.freelance,career:state.career,research:state.research},null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lab-database.json';a.click();
  };
  g('g-import').onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{try{
      const d=JSON.parse(r.result);
      state.config=Object.assign(structuredClone(DEFAULT_CONFIG),d.config||{});
      state.projects=d.projects||[]; state.media=d.media||[]; state.research=d.research||[];
      state.freelance=d.freelance||[]; state.career=d.career||[];
      markDirty();closeSettings();render();toast('已导入');
    }catch(err){toast('导入失败：'+err.message,'err');}};r.readAsText(f);
  };
  // 维度编辑
  document.querySelectorAll('.cfg-metric').forEach(row=>{
    const kind=row.dataset.kind, i=+row.dataset.i;
    row.querySelector('[data-f=name]').oninput=e=>{state.config[kind][i].name=e.target.value;saveLocal();};
    row.querySelector('[data-f=weight]').oninput=e=>{state.config[kind][i].weight=+e.target.value||0;saveLocal();};
    row.querySelector('[data-f=type]').onchange=e=>{state.config[kind][i].type=e.target.checked?'cost':'value';saveLocal();};
  });
  ['midCats','mediaBottom','researchKinds'].forEach(kind=>{
    const inp=g('cat-in-'+kind);
    if(inp) inp.onkeydown=e=>{if(e.key==='Enter'&&inp.value.trim()){state.config[kind].push(inp.value.trim());saveLocal();openSettings();}};
  });
}
function addMetric(kind){state.config[kind].push({id:uid(),name:'新维度',weight:1,type:'value'});saveLocal();openSettings();}
function rmMetric(kind,i){state.config[kind].splice(i,1);saveLocal();openSettings();}
function rmCat(kind,i){state.config[kind].splice(i,1);saveLocal();openSettings();}

/* ============================ 事件 / 启动 ============================ */
document.getElementById('tabs').onclick=e=>{const t=e.target.closest('.tab');if(t){state.ui.tab=t.dataset.tab;render();}};
document.getElementById('syncchip').onclick=forceSync;
document.getElementById('btn-settings').onclick=openSettings;
document.getElementById('modal-close').onclick=closeSettings;
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeSettings();};
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeDrawer();closeSettings();}
  if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();forceSync();}
});
// 关闭/切走标签页前，若仍有未同步内容，尽力补一次同步
window.addEventListener('beforeunload',e=>{ if(drawerCtx)applyDrawerFields(); if(state.dirty){forceSync(); e.preventDefault(); e.returnValue='';} });
document.addEventListener('visibilitychange',()=>{ if(document.hidden){ if(drawerCtx)applyDrawerFields(); if(state.dirty)forceSync(); } });

loadLocal();
render();
if(state.gh.owner&&state.gh.repo&&state.gh.token){ ghLoad(); }
else { setSync('local','仅本地（未连接仓库）'); }
</script>
</body>
</html>
